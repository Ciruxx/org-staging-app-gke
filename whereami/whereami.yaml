apiVersion: apps/v1
kind: Deployment
metadata:
  name: whereami
  namespace: default
  labels:
    app: whereami
    environment: dev
spec:
  selector:
    matchLabels:
      app: whereami
      environment: dev
  template:
    metadata:
      labels:
        app: whereami
        environment: dev
    spec:
      containers:
        - name: whereami-fe
          image: us-docker.pkg.dev/google-samples/containers/gke/whereami:v1.2.22
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 250m
              memory: 128Mi
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
